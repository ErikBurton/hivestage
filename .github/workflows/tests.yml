name: HiveStage Tests

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest playwright pytest-playwright python-dotenv

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Start Next.js dev server
        run: npm run dev &
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Wait for server to be ready
        run: |
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run tests
        run: pytest tests/ -v --tracing=retain-on-failure
        env:
          TEST_BASE_URL: http://localhost:3000
          TEST_BAND_EMAIL: ${{ secrets.TEST_BAND_EMAIL }}
          TEST_BAND_PASSWORD: ${{ secrets.TEST_BAND_PASSWORD }}
          TEST_FAN_EMAIL: ${{ secrets.TEST_FAN_EMAIL }}
          TEST_FAN_PASSWORD: ${{ secrets.TEST_FAN_PASSWORD }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      
      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
