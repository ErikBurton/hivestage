name: Keep Supabase Test Project Alive
on:
  schedule:
    - cron: '0 12 * * *'  # runs every day at noon UTC
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping test Supabase project
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.TEST_NEXT_PUBLIC_SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -gt 299 ]; then
            echo "Ping failed with status $HTTP_STATUS"
            exit 1
          fi
          echo "Project is alive"
